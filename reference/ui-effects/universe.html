<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Quantum Sea Saturn - Deep Gradient Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000510;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f0ff;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0088ff;
            pointer-events: none;
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script>
        Math.seedrandom('ocean-saturn-constant');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(0, 150, 350);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        function createOceanTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(0, 255, 200, 0.5)');
            grad.addColorStop(0.3, 'rgba(0, 150, 255, 0.2)');
            grad.addColorStop(0.7, 'rgba(0, 20, 100, 0.1)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }
        const oceanTex = createOceanTexture();
        const bubbleGeo = new THREE.BufferGeometry();
        const bubblePos = new Float32Array(8000 * 3);
        for (let i = 0; i < 8000 * 3; i++) bubblePos[i] = (Math.random() - 0.5) * 2000;
        bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePos, 3));
        scene.add(new THREE.Points(bubbleGeo, new THREE.PointsMaterial({ size: 2, color: 0x88ffff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending })));
        const seaClouds = [];
        const seaGroup = new THREE.Group();
        for (let i = 0; i < 60; i++) {
            const mat = new THREE.SpriteMaterial({ map: oceanTex, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false });
            const sprite = new THREE.Sprite(mat);
            const angle = Math.random() * Math.PI * 2;
            const r = 40 + Math.random() * 60;
            sprite.position.set(Math.cos(angle) * r, (Math.random() - 0.5) * 60, Math.sin(angle) * r);
            sprite.scale.set(100 + Math.random() * 100, 100 + Math.random() * 100, 1);
            sprite.userData = { rotSpeed: (Math.random() - 0.5) * 0.005, phase: Math.random() * Math.PI };
            seaClouds.push(sprite);
            seaGroup.add(sprite);
        }
        scene.add(seaGroup);
        function createNetwork(isRing, radiusOffset = 0) {
            const group = new THREE.Group();
            const count = isRing ? 700 : 500;
            const positions = [];
            const colors = [];
            const color = new THREE.Color();
            for (let i = 0; i < count; i++) {
                let x, y, z;
                if (isRing) {
                    const angle = (i / count) * Math.PI * 2;
                    const r = (70 + radiusOffset) + Math.random() * 25;
                    x = Math.cos(angle) * r; z = Math.sin(angle) * r;
                    y = (Math.random() - 0.5) * 5;
                    color.setHSL(0.55 + (r - 70) * 0.002, 0.8, 0.5);
                } else {
                    const phi = Math.acos(-1 + (2 * i) / count);
                    const theta = Math.sqrt(count * Math.PI) * phi;
                    const r = 45;
                    x = r * Math.cos(theta) * Math.sin(phi);
                    y = r * Math.sin(theta) * Math.sin(phi);
                    z = r * Math.cos(phi);
                    color.setHSL(0.5 + (Math.abs(y) / 45) * 0.1, 0.9, 0.5);
                }
                positions.push(x, y, z);
                colors.push(color.r, color.g, color.b);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 1.8, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true }));
            group.add(points);
            const linePos = [];
            const lineColors = [];
            const maxDist = isRing ? 15 : 20;
            for (let i = 0; i < count; i++) {
                for (let j = i + 1; j < count; j++) {
                    const dx = positions[i * 3] - positions[j * 3], dy = positions[i * 3 + 1] - positions[j * 3 + 1], dz = positions[i * 3 + 2] - positions[j * 3 + 2];
                    if (dx * dx + dy * dy + dz * dz < maxDist * maxDist) {
                        linePos.push(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2], positions[j * 3], positions[j * 3 + 1], positions[j * 3 + 2]);
                        lineColors.push(colors[i * 3], colors[i * 3 + 1], colors[i * 3 + 2], colors[j * 3], colors[j * 3 + 1], colors[j * 3 + 2]);
                    }
                }
            }
            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
            lineGeo.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
            group.add(new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.25 })));
            return group;
        }
        const planetNet = createNetwork(false);
        const ring1 = createNetwork(true, 0);
        const ring2 = createNetwork(true, 15);
        ring1.rotation.x = Math.PI / 2.2;
        ring2.rotation.x = -Math.PI / 4;
        scene.add(planetNet, ring1, ring2);
        const sparkLines = [];
        for (let i = 0; i < 6; i++) {
            const line = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xe0ffff, transparent: true, blending: THREE.AdditiveBlending }));
            line.userData = { timer: 0, active: false };
            scene.add(line);
            sparkLines.push(line);
        }
        function launchSpark(line) {
            const pts = [];
            let curr = new THREE.Vector3((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);
            for (let i = 0; i < 12; i++) {
                pts.push(curr.clone());
                curr.add(new THREE.Vector3((Math.random() - 0.5) * 25, (Math.random() - 0.5) * 25, (Math.random() - 0.5) * 25));
            }
            line.geometry.setFromPoints(pts);
            line.userData.active = true;
            line.userData.timer = 1.0;
        }
        function animate() {
            requestAnimationFrame(animate);
            planetNet.rotation.y += 0.0015;
            ring1.rotation.z -= 0.003;
            ring2.rotation.z += 0.004;
            seaClouds.forEach(s => {
                s.userData.phase += 0.005;
                s.material.rotation += s.userData.rotSpeed;
                s.material.opacity = 0.3 + Math.sin(s.userData.phase) * 0.2;
                const pulse = 1 + Math.sin(s.userData.phase) * 0.1;
                s.scale.set(100 * pulse, 100 * pulse, 1);
            });
            seaGroup.rotation.y += 0.0005;
            sparkLines.forEach(l => {
                if (!l.userData.active && Math.random() < 0.015) launchSpark(l);
                if (l.userData.active) {
                    l.userData.timer -= 0.08;
                    l.material.opacity = l.userData.timer;
                    if (l.userData.timer <= 0) l.userData.active = false;
                }
            });
            controls.update();
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
