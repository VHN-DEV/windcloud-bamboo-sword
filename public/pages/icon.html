<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Gallery</title>
  <link rel="icon" href="../assets/images/favicon.ico">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07131f;
      --text: #e7f4ff;
      --muted: #96afc7;
      --accent: #2ac3ff;
      --border: #1c3b57;
      --chip: #102436;
      --preview-bg: rgba(4, 10, 16, 0.55);
      --preview-bg-light: #f3f7fd;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Noto Sans", system-ui, sans-serif; background: radial-gradient(circle at top, #10273d 0%, var(--bg) 65%); color: var(--text); }
    .container { width: min(1200px, 100% - 32px); margin: 24px auto 40px; }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 3vw, 36px); }
    p { margin: 0 0 20px; color: var(--muted); }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .tab-btn { border: 1px solid var(--border); background: var(--chip); color: var(--text); border-radius: 999px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
    .tab-btn.is-active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(42, 195, 255, 0.35) inset; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    input[type="search"] { flex: 1; min-width: 260px; border: 1px solid var(--border); background: rgba(6, 14, 24, 0.8); color: var(--text); border-radius: 12px; padding: 10px 12px; font-size: 15px; }
    #count { color: var(--muted); font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .icon-card { border: 1px solid var(--border); border-radius: 12px; background: linear-gradient(180deg, rgba(26, 48, 71, 0.9), rgba(16, 30, 44, 0.9)); padding: 12px; cursor: pointer; }
    .icon-preview { width: 100%; height: 88px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border-radius: 10px; background: var(--preview-bg); }
    .icon-preview img { width: 54px; height: 54px; object-fit: contain; }
    .icon-name { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toggle-btn { border: 1px solid var(--border); background: #12263a; color: var(--text); border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    .toggle-btn.is-active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(42, 195, 255, 0.35) inset; }
    .pagination { margin-top: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pagination button { border: 1px solid var(--border); background: #12263a; color: var(--text); border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    .pagination button[disabled] { opacity: 0.4; cursor: not-allowed; }
    .toast { position: fixed; right: 16px; bottom: 16px; max-width: min(90vw, 460px); background: #06111d; border: 1px solid var(--accent); border-radius: 10px; padding: 10px 12px; opacity: 0; pointer-events: none; transform: translateY(8px); transition: opacity 140ms ease, transform 140ms ease; }
    .toast.is-visible { opacity: 1; transform: translateY(0); }
    .modal { position: fixed; inset: 0; display: none; align-items: flex-end; justify-content: center; background: rgba(2, 7, 12, 0.58); padding: 0; z-index: 30; }
    .modal.is-open { display: flex; }
    .modal-panel { display: flex; width: 100%; height: auto; max-height: 82vh; overflow: auto; border: 1px solid #d8dde4; border-bottom: none; border-radius: 18px 18px 0 0; background: #f5f7fa; color: #111827; padding: 18px; transform: translateY(120%); opacity: 0.98; transition: transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1), opacity 220ms ease; box-shadow: 0 -10px 32px rgba(2, 7, 12, 0.25); }
    .modal.is-open .modal-panel { transform: translateY(0); opacity: 1; }
    .modal-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; width: 100%; max-width: 60%; margin: 0 auto;}
    .modal-left { display: grid; gap: 12px; align-content: start; }
    .preview-panel { border: 1px solid #d8dde4; border-radius: 12px; background: #eef1f5; padding: 14px; min-height: 250px; width: 250px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .preview-panel.is-dark { background: #0b1622; }
    .preview-panel img { max-width: 210px; max-height: 210px; object-fit: contain; }
    .preview-panel { min-height: 300px; width: 300px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .modal-title { margin: 0; font-size: 30px; line-height: 1; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: transform 150ms ease-out, opacity 150ms ease-out; }
    .modal-title:hover { opacity: 0.85; }
    .modal-title:active { transform: scale(0.98); }
    .modal-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .modal-btn { border: 1px solid #d1d5db; background: #ffffff; color: #111827; border-radius: 10px; padding: 7px 11px; cursor: pointer; font-weight: 600; transition: all 150ms ease-out; }
    .modal-btn:hover { background: #eef2ff; }
    .modal-btn:active { transform: scale(0.97); }
    .modal-btn.is-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .controls { border: 1px solid #d8dde4; border-radius: 12px; padding: 12px; background: #fff; }
    .controls h3 { margin: 0 0 10px; font-size: 13px; color: #6b7280; letter-spacing: 0.04em; }
    .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .control-card { border: 1px solid #d8dde4; border-radius: 10px; padding: 10px; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; }
    .control-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .switch { width: 38px; height: 20px; border-radius: 999px; border: 1px solid #cbd5e1; background: #e5e7eb; cursor: pointer; position: relative; padding: 0; }
    .switch-thumb { width: 16px; height: 16px; border-radius: 999px; background: #fff; display: block; transform: translateX(1px); transition: transform 160ms ease; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .switch[data-state="checked"] { background: #2563eb; border-color: #2563eb; }
    .switch[data-state="checked"] .switch-thumb { transform: translateX(19px); }
    .sub-label { font-size: 10px; color: #6b7280; margin-top: 2px; }
    .color-wrap { display: flex; align-items: center; gap: 8px; }
    .color-wrap.is-hidden { display: none; }
    .color-code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; color: #374151; }
    .control-row input[type="color"] { width: 28px; height: 28px; border: none; border-radius: 999px; background: transparent; cursor: pointer; padding: 0; overflow: hidden; }
    .icon-only-btn { width: 36px; height: 36px; border-radius: 999px; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; }
    .btn-group { display: inline-flex; align-items: stretch; border-radius: 8px; overflow: hidden; border: 1px solid #d1d5db; }
    .btn-group > button { border: 0; border-right: 1px solid #d1d5db; border-radius: 0; }
    .btn-group > button:last-child { border-right: 0; }
    .icon-label-btn { display: inline-flex; align-items: center; gap: 6px; background: #2563eb; color: #fff; border: 0; padding: 6px 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 150ms ease-out; }
    .icon-label-btn:hover { filter: brightness(0.95); }
    .icon-label-btn:active { transform: scale(0.97); }
    .icon-square-btn { width: 32px; display: inline-flex; align-items: center; justify-content: center; background: #fff; color: #1f2937; border: 0; cursor: pointer; transition: all 150ms ease-out; }
    .icon-square-btn:hover { background: #eef2ff; }
    .icon-square-btn:active { transform: scale(0.96); }
    @media (max-width: 840px) {
      .modal-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>IMAGE GALLERY</h1>
    <p>Mỗi tab tương ứng 1 thư mục trong <code>assets/images</code>. Hiển thị tất cả ảnh (svg, png, jpg, webp, gif, avif, ico). Click ảnh để copy đường dẫn.</p>
    <nav id="tabs" class="tabs" aria-label="Thư mục ảnh"></nav>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Tìm theo tên file..." aria-label="Tìm ảnh">
      <span id="count"></span>
      <button id="preview-bg-toggle" class="toggle-btn" type="button">Nền sáng: false</button>
    </div>
    <section id="icon-grid" class="grid" aria-live="polite"></section>
    <div class="pagination">
      <button id="prev-page" type="button">← Trước</button>
      <span id="page-status"></span>
      <button id="next-page" type="button">Sau →</button>
    </div>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="svg-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="svg-modal-title">
    <div class="modal-panel">
      <div class="modal-layout">
        <aside class="modal-left">
          <div id="svg-preview-box" class="preview-panel"></div>
        </aside>
        <div>
          <div class="modal-head">
            <h2 id="svg-modal-title" class="modal-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>
              <span id="svg-modal-title-text">SVG icon</span>
            </h2>
            <div style="display:flex; gap:8px;">
              <button id="copy-link-btn" class="modal-btn icon-only-btn" type="button" title="Copy icon link" aria-label="Copy icon link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 17H7A5 5 0 0 1 7 7h2"></path><path d="M15 7h2a5 5 0 1 1 0 10h-2"></path><line x1="8" x2="16" y1="12" y2="12"></line></svg>
              </button>
            </div>
          </div>
          <div class="modal-actions">
            <div class="btn-group">
              <button id="copy-svg-code-btn" class="icon-label-btn" type="button" title="Copy SVG">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>
                SVG
              </button>
              <button id="download-svg-btn" class="icon-square-btn" type="button" title="Download SVG">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V3"></path><path d="m6 11 6 6 6-6"></path><path d="M19 21H5"></path></svg>
              </button>
            </div>
            <div class="btn-group">
              <button id="copy-png-btn" class="icon-label-btn" type="button" title="Copy PNG">PNG</button>
              <button id="download-png-btn" class="icon-square-btn" type="button" title="Download PNG">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V3"></path><path d="m6 11 6 6 6-6"></path><path d="M19 21H5"></path></svg>
              </button>
            </div>
          </div>
          <div class="controls">
            <h3>CUSTOMIZE COLORS</h3>
            <div class="control-row">
              <div class="control-card">
                <div class="control-top">
                  <button id="fill-toggle-btn" class="switch" type="button" role="switch" aria-checked="false" data-state="unchecked"><span class="switch-thumb"></span></button>
                  <div>
                    <strong>Fill</strong>
                    <p class="sub-label" style="margin: 0;">Replace all fill colors</p>
                  </div>
                </div>
                <div id="fill-color-wrap" class="color-wrap is-hidden">
                  <input id="fill-color-picker" type="color" value="#1f2937">
                  <span id="fill-color-code" class="color-code">#1f2937</span>
                </div>
              </div>
              <div class="control-card">
                <div class="control-top">
                  <button id="stroke-toggle-btn" class="switch" type="button" role="switch" aria-checked="false" data-state="unchecked"><span class="switch-thumb"></span></button>
                  <div>
                    <strong>Stroke</strong>
                    <p class="sub-label" style="margin: 0;">Replace all stroke colors</p>
                  </div>
                </div>
                <div id="stroke-color-wrap" class="color-wrap is-hidden">
                  <input id="stroke-color-picker" type="color" value="#1f2937">
                  <span id="stroke-color-code" class="color-code">#1f2937</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <button id="svg-modal-close" class="modal-btn icon-only-btn" type="button" title="Đóng">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <script src="./images-manifest.js"></script>
  <script>
    const PAGE_SIZE = 24;
    const IMAGE_MANIFEST_URL = "./images-manifest.json";
    let IMAGE_BY_FOLDER = window.__IMAGE_MANIFEST__ && typeof window.__IMAGE_MANIFEST__ === "object" ? window.__IMAGE_MANIFEST__ : {};

    const tabsRoot = document.getElementById('tabs');
    const grid = document.getElementById('icon-grid');
    const searchInput = document.getElementById('search');
    const countEl = document.getElementById('count');
    const pageStatus = document.getElementById('page-status');
    const prevBtn = document.getElementById('prev-page');
    const nextBtn = document.getElementById('next-page');
    const toast = document.getElementById('toast');
    const previewBgToggle = document.getElementById('preview-bg-toggle');
    const svgModal = document.getElementById('svg-modal');
    const svgModalClose = document.getElementById('svg-modal-close');
    const svgPreviewBox = document.getElementById('svg-preview-box');
    const copySvgCodeBtn = document.getElementById('copy-svg-code-btn');
    const svgModalTitle = document.getElementById('svg-modal-title');
    const svgModalTitleText = document.getElementById('svg-modal-title-text');
    const copyLinkBtn = document.getElementById('copy-link-btn');
    const downloadSvgBtn = document.getElementById('download-svg-btn');
    const copyPngBtn = document.getElementById('copy-png-btn');
    const downloadPngBtn = document.getElementById('download-png-btn');
    const fillToggleBtn = document.getElementById('fill-toggle-btn');
    const fillColorPicker = document.getElementById('fill-color-picker');
    const fillColorWrap = document.getElementById('fill-color-wrap');
    const fillColorCode = document.getElementById('fill-color-code');
    const strokeToggleBtn = document.getElementById('stroke-toggle-btn');
    const strokeColorPicker = document.getElementById('stroke-color-picker');
    const strokeColorWrap = document.getElementById('stroke-color-wrap');
    const strokeColorCode = document.getElementById('stroke-color-code');

    let folderNames = Object.keys(IMAGE_BY_FOLDER);
    let activeFolder = folderNames[0] || '';
    let filtered = [];
    let currentPage = 1;
    let isLightPreview = false;
    let currentSvgPath = '';
    let originalSvgCode = '';
    let previewBlobUrl = '';
    let isLightPopupPreview = true;
    let isFillEnabled = false;
    let isStrokeEnabled = false;
    const isFileProtocol = window.location.protocol === 'file:';

    function renderPreviewBgToggle() {
      document.documentElement.style.setProperty('--preview-bg', isLightPreview ? 'var(--preview-bg-light)' : 'rgba(4, 10, 16, 0.55)');
      previewBgToggle.textContent = `Nền sáng: ${isLightPreview ? 'true' : 'false'}`;
      previewBgToggle.classList.toggle('is-active', isLightPreview);
    }

    function renderColorToggleUI() {
      fillToggleBtn.setAttribute('aria-checked', String(isFillEnabled));
      strokeToggleBtn.setAttribute('aria-checked', String(isStrokeEnabled));
      fillToggleBtn.setAttribute('data-state', isFillEnabled ? 'checked' : 'unchecked');
      strokeToggleBtn.setAttribute('data-state', isStrokeEnabled ? 'checked' : 'unchecked');
      fillColorWrap.classList.toggle('is-hidden', !isFillEnabled);
      strokeColorWrap.classList.toggle('is-hidden', !isStrokeEnabled);
      fillColorCode.textContent = fillColorPicker.value;
      strokeColorCode.textContent = strokeColorPicker.value;
    }

    function getCustomizedSvgCode() {
      if (!originalSvgCode) return '';
      const parser = new DOMParser();
      const doc = parser.parseFromString(originalSvgCode, 'image/svg+xml');
      const svg = doc.documentElement;
      if (!svg || svg.tagName.toLowerCase() !== 'svg') return originalSvgCode;

      const paintTargets = svg.querySelectorAll('path, circle, rect, polygon, polyline, line, ellipse, g, text, use');

      if (isFillEnabled) {
        const fillColor = fillColorPicker.value;
        svg.querySelectorAll('[fill]').forEach((el) => {
          if ((el.getAttribute('fill') || '').toLowerCase() !== 'none') el.setAttribute('fill', fillColor);
        });
        paintTargets.forEach((el) => {
          if (!el.hasAttribute('fill')) el.setAttribute('fill', fillColor);
        });
      }

      if (isStrokeEnabled) {
        const strokeColor = strokeColorPicker.value;
        svg.querySelectorAll('[stroke]').forEach((el) => {
          if ((el.getAttribute('stroke') || '').toLowerCase() !== 'none') el.setAttribute('stroke', strokeColor);
        });
        paintTargets.forEach((el) => {
          if (!el.hasAttribute('stroke')) return;
          if ((el.getAttribute('stroke') || '').toLowerCase() === 'none') return;
          el.setAttribute('stroke', strokeColor);
        });
      }

      return new XMLSerializer().serializeToString(svg);
    }

    function renderSvgModal() {
      const customized = getCustomizedSvgCode();
      svgPreviewBox.classList.toggle('is-dark', !isLightPopupPreview);
      if (previewBlobUrl) {
        URL.revokeObjectURL(previewBlobUrl);
        previewBlobUrl = '';
      }
      if (!customized) {
        if (isFileProtocol && currentSvgPath) {
          svgPreviewBox.innerHTML = `<img src="${currentSvgPath}" alt="${fileNameFromPath(currentSvgPath)}" style="max-width:180px;max-height:180px;object-fit:contain;">`;
          return;
        }
        svgPreviewBox.innerHTML = '';
        return;
      }
      const blob = new Blob([customized], { type: 'image/svg+xml;charset=utf-8' });
      previewBlobUrl = URL.createObjectURL(blob);
      svgPreviewBox.innerHTML = `<img src="${previewBlobUrl}" alt="SVG preview" style="width:100%;height:100%;max-width:180px;max-height:180px;object-fit:contain;">`;
    }

    async function openSvgModal(path) {
      currentSvgPath = path;
      svgModalTitleText.textContent = fileNameFromPath(path);
      isFillEnabled = false;
      isStrokeEnabled = false;
      renderColorToggleUI();

      if (isFileProtocol) {
        originalSvgCode = '';
        svgPreviewBox.innerHTML = `<img src="${path}" alt="${fileNameFromPath(path)}" style="max-width:180px;max-height:180px;object-fit:contain;">`;
        svgModal.classList.add('is-open');
        return;
      }

      try {
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error('Không tải được SVG');
        originalSvgCode = await response.text();
        renderSvgModal();
        svgModal.classList.add('is-open');
      } catch (error) {
        showToast('Không mở được chi tiết SVG.');
      }
    }

    function closeSvgModal() {
      if (previewBlobUrl) {
        URL.revokeObjectURL(previewBlobUrl);
        previewBlobUrl = '';
      }
      svgModal.classList.remove('is-open');
    }

    function createPngBlobFromSvgCode(code) {
      return new Promise((resolve, reject) => {
        const svgBlob = new Blob([code], { type: 'image/svg+xml;charset=utf-8' });
        const svgUrl = URL.createObjectURL(svgBlob);
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 512;
          canvas.height = 512;
          const ctx = canvas.getContext('2d');
          if (!ctx) {
            URL.revokeObjectURL(svgUrl);
            reject(new Error('Canvas not supported'));
            return;
          }
          if (!isLightPopupPreview) {
            ctx.fillStyle = '#0b1622';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          }
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob((blob) => {
            URL.revokeObjectURL(svgUrl);
            if (!blob) {
              reject(new Error('Cannot export PNG'));
              return;
            }
            resolve(blob);
          }, 'image/png');
        };
        img.onerror = () => {
          URL.revokeObjectURL(svgUrl);
          reject(new Error('Cannot render PNG'));
        };
        img.src = svgUrl;
      });
    }

    const fileNameFromPath = (path) => path.split('/').pop() || path;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('is-visible');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('is-visible'), 1800);
    }

    async function copyText(text, successMessage) {
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const temp = document.createElement('textarea');
          temp.value = text;
          document.body.appendChild(temp);
          temp.select();
          document.execCommand('copy');
          temp.remove();
        }
        showToast(successMessage);
      } catch (err) {
        showToast('Không thể copy. Hãy kiểm tra quyền clipboard.');
      }
    }

    function copyPath(path) {
      return copyText(path, `Đã copy: ${path}`);
    }


    async function loadImageManifest() {
      try {
        if (!Object.keys(IMAGE_BY_FOLDER).length) {
          const response = await fetch(IMAGE_MANIFEST_URL, { cache: 'no-store' });
          if (!response.ok) throw new Error('Không tải được manifest');
          IMAGE_BY_FOLDER = await response.json();
        }
        folderNames = Object.keys(IMAGE_BY_FOLDER);
        activeFolder = folderNames[0] || '';
      } catch (error) {
        IMAGE_BY_FOLDER = {};
        folderNames = [];
        activeFolder = '';
      }
    }

    function renderTabs() {
      tabsRoot.innerHTML = '';
      folderNames.forEach((folder) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `tab-btn${folder === activeFolder ? ' is-active' : ''}`;
        button.textContent = `${folder} (${IMAGE_BY_FOLDER[folder].length})`;
        button.addEventListener('click', () => {
          activeFolder = folder;
          currentPage = 1;
          renderTabs();
          applyFilter(searchInput.value);
        });
        tabsRoot.appendChild(button);
      });
    }

    function renderPage() {
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      currentPage = Math.min(Math.max(1, currentPage), totalPages);

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      grid.innerHTML = '';
      pageItems.forEach((path) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'icon-card';
        card.title = `Copy đường dẫn: ${path}`;
        card.addEventListener('click', () => {
          if (path.toLowerCase().endsWith('.svg')) {
            openSvgModal(path);
            return;
          }
          copyPath(path);
        });
        card.innerHTML = `<div class="icon-preview"><img loading="lazy" src="${path}" alt="${fileNameFromPath(path)}"></div><div class="icon-name">${fileNameFromPath(path)}</div>`;
        grid.appendChild(card);
      });

      countEl.textContent = `Thư mục ${activeFolder}: ${filtered.length} ảnh`;
      pageStatus.textContent = `Trang ${currentPage}/${totalPages}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    function applyFilter(keyword = '') {
      const normalized = keyword.trim().toLowerCase();
      const base = IMAGE_BY_FOLDER[activeFolder] || [];
      filtered = normalized ? base.filter((path) => fileNameFromPath(path).toLowerCase().includes(normalized)) : base;
      currentPage = 1;
      renderPage();
    }

    async function init() {
      await loadImageManifest();
      if (!folderNames.length) {
        grid.innerHTML = '<p>Không tìm thấy thư mục ảnh trong assets/images.</p>';
        countEl.textContent = '0 ảnh';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }
      renderTabs();
      applyFilter('');
    }

    searchInput.addEventListener('input', (event) => applyFilter(event.target.value));
    prevBtn.addEventListener('click', () => { currentPage -= 1; renderPage(); });
    nextBtn.addEventListener('click', () => { currentPage += 1; renderPage(); });
    previewBgToggle.addEventListener('click', () => {
      isLightPreview = !isLightPreview;
      renderPreviewBgToggle();
    });
    svgModalClose.addEventListener('click', closeSvgModal);
    svgModal.addEventListener('click', (event) => {
      if (event.target === svgModal) closeSvgModal();
    });
    fillToggleBtn.addEventListener('click', () => {
      isFillEnabled = !isFillEnabled;
      renderColorToggleUI();
      renderSvgModal();
    });
    strokeToggleBtn.addEventListener('click', () => {
      isStrokeEnabled = !isStrokeEnabled;
      renderColorToggleUI();
      renderSvgModal();
    });
    fillColorPicker.addEventListener('input', () => {
      fillColorCode.textContent = fillColorPicker.value;
      renderSvgModal();
    });
    strokeColorPicker.addEventListener('input', () => {
      strokeColorCode.textContent = strokeColorPicker.value;
      renderSvgModal();
    });
    svgPreviewBox.addEventListener('click', () => {
      isLightPopupPreview = !isLightPopupPreview;
      renderSvgModal();
    });
    svgModalTitle.addEventListener('click', async () => {
      const name = (fileNameFromPath(currentSvgPath || 'icon.svg')).replace(/\.svg$/i, '');
      await copyText(name, `Đã copy name: ${name}`);
    });
    copyLinkBtn.addEventListener('click', async () => {
      const name = (fileNameFromPath(currentSvgPath || 'icon.svg')).replace(/\.svg$/i, '');
      const base = `${window.location.origin === 'null' ? '' : window.location.origin}${window.location.pathname}`;
      const shareLink = `${base}#${encodeURIComponent(name)}`;
      await copyText(shareLink, 'Đã copy link icon.');
    });
    copySvgCodeBtn.addEventListener('click', async () => {
      const code = getCustomizedSvgCode();
      if (!code) {
        if (!currentSvgPath) return;
        await copyText(currentSvgPath, 'Không đọc được code SVG trong file://, đã copy đường dẫn file.');
        return;
      }
      await copyText(code, 'Đã copy code SVG.');
    });
    downloadSvgBtn.addEventListener('click', () => {
      const code = getCustomizedSvgCode();
      if (!code) {
        if (!currentSvgPath) return;
        const a = document.createElement('a');
        a.href = currentSvgPath;
        a.download = fileNameFromPath(currentSvgPath);
        document.body.appendChild(a);
        a.click();
        a.remove();
        return;
      }
      const blob = new Blob([code], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const name = fileNameFromPath(currentSvgPath || 'icon.svg').replace(/\.svg$/i, '');
      a.href = url;
      a.download = `${name}.svg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
    copyPngBtn.addEventListener('click', async () => {
      const code = getCustomizedSvgCode();
      if (!code) return;
      try {
        const blob = await createPngBlobFromSvgCode(code);
        if (navigator.clipboard?.write && window.ClipboardItem) {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          showToast('Đã copy PNG vào clipboard.');
          return;
        }
        showToast('Trình duyệt không hỗ trợ copy ảnh PNG trực tiếp.');
      } catch (error) {
        showToast('Không thể copy PNG.');
      }
    });
    downloadPngBtn.addEventListener('click', async () => {
      const code = getCustomizedSvgCode();
      if (!code) return;
      const name = fileNameFromPath(currentSvgPath || 'icon.svg').replace(/\.svg$/i, '');
      try {
        const blob = await createPngBlobFromSvgCode(code);
        const pngUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = pngUrl;
        a.download = `${name}.png`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(pngUrl);
      } catch (error) {
        showToast('Không thể tải PNG.');
      }
    });
    renderColorToggleUI();
    renderPreviewBgToggle();
    init();
  </script>
</body>
</html>
