<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Gallery</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07131f;
      --text: #e7f4ff;
      --muted: #96afc7;
      --accent: #2ac3ff;
      --border: #1c3b57;
      --chip: #102436;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Noto Sans", system-ui, sans-serif; background: radial-gradient(circle at top, #10273d 0%, var(--bg) 65%); color: var(--text); }
    .container { width: min(1200px, 100% - 32px); margin: 24px auto 40px; }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 3vw, 36px); }
    p { margin: 0 0 20px; color: var(--muted); }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .tab-btn { border: 1px solid var(--border); background: var(--chip); color: var(--text); border-radius: 999px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
    .tab-btn.is-active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(42, 195, 255, 0.35) inset; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    input[type="search"] { flex: 1; min-width: 260px; border: 1px solid var(--border); background: rgba(6, 14, 24, 0.8); color: var(--text); border-radius: 12px; padding: 10px 12px; font-size: 15px; }
    #count { color: var(--muted); font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .icon-card { border: 1px solid var(--border); border-radius: 12px; background: linear-gradient(180deg, rgba(26, 48, 71, 0.9), rgba(16, 30, 44, 0.9)); padding: 12px; cursor: pointer; }
    .icon-preview { width: 100%; height: 88px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border-radius: 10px; background: rgba(4, 10, 16, 0.55); }
    .icon-preview img { width: 54px; height: 54px; object-fit: contain; }
    .icon-name { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pagination { margin-top: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pagination button { border: 1px solid var(--border); background: #12263a; color: var(--text); border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    .pagination button[disabled] { opacity: 0.4; cursor: not-allowed; }
    .toast { position: fixed; right: 16px; bottom: 16px; max-width: min(90vw, 460px); background: #06111d; border: 1px solid var(--accent); border-radius: 10px; padding: 10px 12px; opacity: 0; pointer-events: none; transform: translateY(8px); transition: opacity 140ms ease, transform 140ms ease; }
    .toast.is-visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <main class="container">
    <h1>IMAGE GALLERY</h1>
    <p>Mỗi tab tương ứng 1 thư mục trong <code>assets/images</code>. Hiển thị tất cả ảnh (svg, png, jpg, webp, gif, avif, ico). Click ảnh để copy đường dẫn.</p>
    <nav id="tabs" class="tabs" aria-label="Thư mục ảnh"></nav>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Tìm theo tên file..." aria-label="Tìm ảnh">
      <span id="count"></span>
    </div>
    <section id="icon-grid" class="grid" aria-live="polite"></section>
    <div class="pagination">
      <button id="prev-page" type="button">← Trước</button>
      <span id="page-status"></span>
      <button id="next-page" type="button">Sau →</button>
    </div>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

    const tabsRoot = document.getElementById('tabs');

    const nextBtn = document.getElementById('next-page');
    const toast = document.getElementById('toast');

    const folderNames = Object.keys(IMAGE_BY_FOLDER);
    let activeFolder = folderNames[0] || '';
    let filtered = [];
    let currentPage = 1;

    const fileNameFromPath = (path) => path.split('/').pop() || path;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('is-visible');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('is-visible'), 1800);
    }

    async function copyPath(path) {
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(path);
        } else {
          const temp = document.createElement('textarea');
          temp.value = path;
          document.body.appendChild(temp);
          temp.select();
          document.execCommand('copy');
          temp.remove();
        }
        showToast(`Đã copy: ${path}`);
      } catch (err) {
        showToast('Không thể copy. Hãy kiểm tra quyền clipboard.');
      }
    }

    function renderTabs() {
      tabsRoot.innerHTML = '';
      folderNames.forEach((folder) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `tab-btn${folder === activeFolder ? ' is-active' : ''}`;
        button.textContent = `${folder} (${IMAGE_BY_FOLDER[folder].length})`;
        button.addEventListener('click', () => {
          activeFolder = folder;
          currentPage = 1;
          renderTabs();
          applyFilter(searchInput.value);
        });
        tabsRoot.appendChild(button);
      });
    }

    function renderPage() {
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      currentPage = Math.min(Math.max(1, currentPage), totalPages);

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      grid.innerHTML = '';
      pageItems.forEach((path) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'icon-card';
        card.title = `Copy đường dẫn: ${path}`;
        card.addEventListener('click', () => copyPath(path));
        card.innerHTML = `<div class="icon-preview"><img loading="lazy" src="${path}" alt="${fileNameFromPath(path)}"></div><div class="icon-name">${fileNameFromPath(path)}</div>`;
        grid.appendChild(card);
      });

      countEl.textContent = `Thư mục ${activeFolder}: ${filtered.length} ảnh`;
      pageStatus.textContent = `Trang ${currentPage}/${totalPages}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    function applyFilter(keyword = '') {
      const normalized = keyword.trim().toLowerCase();
      const base = IMAGE_BY_FOLDER[activeFolder] || [];
      filtered = normalized ? base.filter((path) => fileNameFromPath(path).toLowerCase().includes(normalized)) : base;
      currentPage = 1;
      renderPage();
    }

    function init() {
      if (!folderNames.length) {
        grid.innerHTML = '<p>Không tìm thấy thư mục ảnh trong assets/images.</p>';
        countEl.textContent = '0 ảnh';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }
      renderTabs();
      applyFilter('');
    }

    searchInput.addEventListener('input', (event) => applyFilter(event.target.value));
    prevBtn.addEventListener('click', () => { currentPage -= 1; renderPage(); });
    nextBtn.addEventListener('click', () => { currentPage += 1; renderPage(); });
    init();
  </script>
</body>
</html>
