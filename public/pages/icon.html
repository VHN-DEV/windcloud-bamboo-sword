<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Gallery</title>
  <link rel="icon" href="../assets/images/favicon.ico">
  <link rel="stylesheet" href="../assets/css/styles.min.css">
</head>
<body class="icon-page">
  <main class="icon-page__main container">
    <h1>IMAGE GALLERY</h1>
    <p class="icon-page__intro">
      Mỗi tab tương ứng 1 thư mục trong <code>assets/images</code>. Hiển thị tất cả ảnh
      (svg, png, jpg, webp, gif, avif, ico). Click ảnh để copy đường dẫn.
    </p>
    <nav id="tabs" class="tabs" aria-label="Thư mục ảnh"></nav>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Tìm theo tên file..." aria-label="Tìm ảnh">
      <span id="count"></span>
      <button id="preview-bg-toggle" class="toggle-btn" type="button">Nền sáng: false</button>
    </div>
    <section id="icon-grid" class="grid" aria-live="polite"></section>
    <div class="pagination">
      <button id="prev-page" type="button">← Trước</button>
      <span id="page-status"></span>
      <button id="next-page" type="button">Sau →</button>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="svg-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="svg-modal-title">
    <div class="modal-panel">
      <div class="modal-layout">
        <aside class="modal-left">
          <div id="svg-preview-box" class="preview-panel"></div>
        </aside>

        <div class="modal-right">
          <div class="modal-head">
            <h2 id="svg-modal-title" class="modal-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
              </svg>
              <span id="svg-modal-title-text">SVG icon</span>
            </h2>

            <div class="modal-head-actions">
              <button id="copy-link-btn" class="modal-btn icon-only-btn" type="button" title="Copy icon link" aria-label="Copy icon link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M9 17H7A5 5 0 0 1 7 7h2"></path>
                  <path d="M15 7h2a5 5 0 1 1 0 10h-2"></path>
                  <line x1="8" x2="16" y1="12" y2="12"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="modal-actions">
            <div class="btn-group">
              <button id="copy-svg-code-btn" class="icon-label-btn" type="button" title="Copy SVG">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                  <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
                </svg>
                SVG
              </button>
              <button id="download-svg-btn" class="icon-square-btn" type="button" title="Download SVG" aria-label="Download SVG">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 17V3"></path>
                  <path d="m6 11 6 6 6-6"></path>
                  <path d="M19 21H5"></path>
                </svg>
              </button>
            </div>

            <div class="btn-group">
              <button id="copy-png-btn" class="icon-label-btn" type="button" title="Copy PNG">PNG</button>
              <button id="download-png-btn" class="icon-square-btn" type="button" title="Download PNG" aria-label="Download PNG">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 17V3"></path>
                  <path d="m6 11 6 6 6-6"></path>
                  <path d="M19 21H5"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="controls">
            <h3>CUSTOMIZE COLORS</h3>

            <div class="control-row">
              <div class="control-card">
                <div class="control-top">
                  <button id="fill-toggle-btn" class="switch" type="button" role="switch" aria-checked="false" data-state="unchecked">
                    <span class="switch-thumb"></span>
                  </button>
                  <div>
                    <strong>Fill</strong>
                    <p class="sub-label">Replace all fill colors</p>
                  </div>
                </div>

                <div id="fill-color-wrap" class="color-wrap is-hidden">
                  <input id="fill-color-picker" type="color" value="#1f2937">
                  <span id="fill-color-code" class="color-code">#1f2937</span>
                </div>
              </div>

              <div class="control-card">
                <div class="control-top">
                  <button id="stroke-toggle-btn" class="switch" type="button" role="switch" aria-checked="false" data-state="unchecked">
                    <span class="switch-thumb"></span>
                  </button>
                  <div>
                    <strong>Stroke</strong>
                    <p class="sub-label">Replace all stroke colors</p>
                  </div>
                </div>

                <div id="stroke-color-wrap" class="color-wrap is-hidden">
                  <input id="stroke-color-picker" type="color" value="#1f2937">
                  <span id="stroke-color-code" class="color-code">#1f2937</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button id="svg-modal-close" class="modal-btn icon-only-btn" type="button" title="Đóng" aria-label="Đóng">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>

  <script src="../assets/js/pages/images-manifest.js"></script>
  <script src="../assets/js/pages/icon.js"></script>
</body>
</html>
