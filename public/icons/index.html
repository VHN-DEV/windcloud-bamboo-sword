<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Gallery</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07131f;
      --surface: #0d1f2f;
      --card: #12263a;
      --text: #e7f4ff;
      --muted: #96afc7;
      --accent: #2ac3ff;
      --border: #1c3b57;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #10273d 0%, var(--bg) 65%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1200px, 100% - 32px);
      margin: 24px auto 40px;
    }

    h1 { margin: 0 0 8px; font-size: clamp(24px, 3vw, 36px); }
    p { margin: 0 0 20px; color: var(--muted); }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="search"] {
      flex: 1;
      min-width: 260px;
      border: 1px solid var(--border);
      background: rgba(6, 14, 24, 0.8);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
    }

    #count { color: var(--muted); font-size: 14px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .icon-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(26, 48, 71, 0.9), rgba(16, 30, 44, 0.9));
      padding: 12px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .icon-card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .icon-preview {
      width: 100%;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      border-radius: 10px;
      background: rgba(4, 10, 16, 0.55);
    }

    .icon-preview img { width: 54px; height: 54px; object-fit: contain; }

    .icon-name {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      max-width: min(90vw, 460px);
      background: #06111d;
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 10px 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 140ms ease, transform 140ms ease;
      color: var(--text);
      font-size: 14px;
    }

    .toast.is-visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <main class="container">
    <h1>/icons</h1>
    <p>Click vào icon để copy đường dẫn file SVG.</p>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Tìm theo tên file..." aria-label="Tìm icon">
      <span id="count"></span>
    </div>

    <section id="icon-grid" class="grid" aria-live="polite"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

        '/assets/images/icons/snitch-quidditch-ball.svg',

        '/assets/images/icons/sugar-cane.svg',
        '/assets/images/icons/t-rex-skull.svg',
        '/assets/images/icons/thor-fist.svg',
        '/assets/images/icons/tick.svg',
        '/assets/images/icons/vanguard.svg',
        '/assets/images/icons/warlock-eye (1).svg',
        '/assets/images/icons/warlock-eye.svg',
        '/assets/images/icons/whirlwind.svg',
        '/assets/images/icons/wulkanowy.svg',
    ];

    const grid = document.getElementById('icon-grid');
    const searchInput = document.getElementById('search');
    const countEl = document.getElementById('count');
    const toast = document.getElementById('toast');

    const fileNameFromPath = (path) => path.split('/').pop() || path;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('is-visible');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('is-visible'), 1800);
    }

    async function copyPath(path) {
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(path);
        } else {
          const temp = document.createElement('textarea');
          temp.value = path;
          document.body.appendChild(temp);
          temp.select();
          document.execCommand('copy');
          temp.remove();
        }
        showToast(`Đã copy: ${path}`);
      } catch (err) {
        console.error('Copy thất bại:', err);
        showToast('Không thể copy. Hãy kiểm tra quyền clipboard.');
      }
    }

    function renderIcons(keyword = '') {
      const normalized = keyword.trim().toLowerCase();
      const list = normalized
        ? iconPaths.filter((path) => fileNameFromPath(path).toLowerCase().includes(normalized))
        : iconPaths;

      grid.innerHTML = '';
      countEl.textContent = `Hiển thị ${list.length} / ${iconPaths.length} icon SVG`;

      list.forEach((path) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'icon-card';
        card.title = `Copy đường dẫn: ${path}`;
        card.addEventListener('click', () => copyPath(path));

        card.innerHTML = `
          <div class="icon-preview"><img loading="lazy" src="${path}" alt="${fileNameFromPath(path)}"></div>
          <div class="icon-name">${fileNameFromPath(path)}</div>
        `;

        grid.appendChild(card);
      });
    }

    searchInput.addEventListener('input', (event) => renderIcons(event.target.value));
    renderIcons();
  </script>
</body>
</html>
