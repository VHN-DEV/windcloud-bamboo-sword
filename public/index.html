<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>🗡️ Đại Canh Kiếm Trận - 72 Thanh Trúc Phong Vân Kiếm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="./assets/css/styles.min.css">
</head>

<body>
    <canvas id="c"></canvas>
    <div id="instructions" class="game-ui">Hold Button: Attack</div>

    <div id="mana-container" class="game-ui">
        <div id="cultivation-rank">Cảnh giới: Luyện khí sơ kỳ (Tầng 1)</div>

        <div id="mana-bar-bg">
            <div id="mana-bar"></div>
            <div id="mana-text">Linh lực: 100/100</div>
        </div>
    </div>

    <div id="exp-container">
        <div id="exp-bar"></div>
        <div id="exp-text">Tu vi: 0/5</div>
    </div>

    <div id="sword-counter" class="game-ui">
        <img src="./assets/images/sword-light.svg" class="counter-icon" alt="Swords">
        <span id="sword-count-text">72/72</span>
    </div>

    <div class="controls-layer">
        <div class="setting-group">
            <div id="btn-settings" class="btn btn-setting">
                <img src="./assets/images/setting.svg" class="sword-icon" alt="Settings">
            </div>
        </div>

        <div class="breakthrough-group">
            <div id="btn-breakthrough" class="btn btn-breakthrough">
                <img src="./assets/images/angel-wings.svg" class="sword-icon" alt="Breakthrough">
            </div>
        </div>

        <div class="attack-group">
            <div id="btn-ultimate" class="btn btn-ultimate" title="Nộ 0/100">
                <img src="./assets/images/lightning.svg" class="sword-icon icon-ult" alt="Ultimate Skill">
            </div>

            <div id="btn-form" class="btn btn-form">
                <img src="./assets/images/gooey-sword.svg" class="sword-icon icon-form" alt="Change Form">
            </div>

            <div id="btn-attack" class="btn btn-attack">
                <img src="./assets/images/sword.svg" class="sword-icon" alt="Attack">
            </div>
        </div>
    </div>

    <div id="settings-popup" class="popup-overlay">
        <div class="popup-content">
            <div class="popup-header">
                <h3>⚙️ THIÊN ĐẠO QUY TẮC</h3>
                <span id="close-settings" class="close-btn">&times;</span>
            </div>
            <div class="popup-body">
                <div class="config-section">
                    <h4>🌌 Quy Tắc Không Gian</h4>
                    <div class="input-grid">
                        <div class="input-group"><label>Số lượng sao:</label><input type="number" id="cfg-bg-star-count"></div>
                        <div class="input-group"><label>Kích thước sao (Min):</label><input type="number" step="0.1" id="cfg-bg-star-min"></div>
                        <div class="input-group"><label>Tốc độ nháy sao:</label><input type="number" step="0.005" id="cfg-bg-star-twinkle"></div>
                        <div class="input-group"><label>Độ mượt zoom:</label><input type="number" step="0.05" id="cfg-zoom-smooth"></div>
                        <div class="input-group"><label>Độ nhạy con lăn:</label><input type="number" step="0.0005" id="cfg-zoom-sens"></div>
                        <div class="input-group"><label>Mờ nền (Motion Blur):</label><input type="text" id="cfg-col-bg-fade"></div>
                    </div>
                </div>

                <div class="config-section">
                    <h4>⚔️ Thanh Trúc Phong Vân Kiếm</h4>
                    <div class="input-grid">
                        <div class="input-group"><label>Số kiếm tối đa:</label><input type="number" id="cfg-sw-count"></div>
                        <div class="input-group"><label>Bán kính vòng 1:</label><input type="number" id="cfg-sw-radius"></div>
                        <div class="input-group"><label>Khoảng cách lớp:</label><input type="number" id="cfg-sw-spacing"></div>
                        <div class="input-group"><label>Tốc độ quay gốc:</label><input type="number" step="0.01" id="cfg-sw-spin"></div>
                        <div class="input-group"><label>Hệ số tốc độ:</label><input type="number" id="cfg-sw-speed-mult"></div>
                        <div class="input-group"><label>Độ dài vệt sáng:</label><input type="number" id="cfg-sw-trail"></div>
                        <div class="input-group"><label>Kích thước kiếm:</label><input type="number" id="cfg-sw-size"></div>
                        <div class="input-group"><label>Hồi kiếm (ms):</label><input type="number" id="cfg-sw-respawn"></div>
                        <div class="input-group"><label>Thời gian xác kiếm (ms):</label><input type="number" id="cfg-sw-death-wait"></div>
                        <div class="input-group"><label>Nhịp thở (Min):</label><input type="number" step="0.005" id="cfg-sw-breath"></div>
                        <div class="input-group"><label>Tạm dừng xoay kiếm:</label><input type="checkbox" id="cfg-sw-paused"></div>
                    </div>
                </div>

                <div class="config-section">
                    <h4>👹 Nghiệp Chướng</h4>
                    <div class="input-grid">
                        <div class="input-group"><label>Quái tối đa:</label><input type="number" id="cfg-en-spawn"></div>
                        <div class="input-group"><label>Tỉ lệ Tinh Anh:</label><input type="number" step="0.01" id="cfg-en-elite"></div>
                        <div class="input-group"><label>Tỉ lệ Khiên:</label><input type="number" step="0.1" id="cfg-en-shield-ch"></div>
                        <div class="input-group"><label>Độ bền khiên (ratio):</label><input type="number" step="0.05" id="cfg-en-shield-hp"></div>
                        <div class="input-group"><label>Số mảnh vỡ quái:</label><input type="number" id="cfg-en-debris"></div>
                        <div class="input-group"><label>Khựng khi trúng (ms):</label><input type="number" id="cfg-sw-stun"></div>
                    </div>
                </div>

                <div class="config-section">
                    <h4>💎 Tài Nguyên & Cơ Duyên</h4>
                    <div class="input-grid">
                        <div class="input-group"><label>Hồi Mana (/s):</label><input type="number" step="0.5" id="cfg-ma-regen"></div>
                        <div class="input-group"><label>Chu kỳ hồi Mana (ms):</label><input type="number" id="cfg-ma-interval"></div>
                        <div class="input-group"><label>Tấn công tốn:</label><input type="number" step="0.1" id="cfg-ma-atk"></div>
                        <div class="input-group"><label>Di chuyển tốn:</label><input type="number" step="0.1" id="cfg-ma-move"></div>
                        <div class="input-group"><label>Hồi kiếm tốn:</label><input type="number" step="1" id="cfg-ma-res-cost"></div>
                        <div class="input-group"><label>Tiêu tốn đổi trạng thái hộ thể (ratio):</label><input type="number" step="0.1" id="cfg-sw-change-form"></div>
                        <div class="input-group"><label>Hồi mana khi tiêu diệt:</label><input type="number" step="1" id="cfg-sw-gain-kill"></div>
                        <div class="input-group"><label>Tỉ lệ rơi đan:</label><input type="number" step="0.05" id="cfg-pi-chance"></div>
                        <div class="input-group"><label>Tốc độ hút đan:</label><input type="number" id="cfg-pi-magnet"></div>
                        <div class="input-group"><label>Độ dài vệt đan:</label><input type="number" id="cfg-pi-trail"></div>
                        <div class="input-group"><label>Phạt đột phá (ratio):</label><input type="number" step="0.1" id="cfg-cu-penalty"></div>
                        <div class="input-group"><label>Max tỉ lệ đột phá:</label><input type="number" step="0.05" id="cfg-cu-max-chance"></div>
                    </div>
                </div>

                <div class="config-section">
                    <h4>⚡ Nộ Kiếm & Ultimate</h4>
                    <div class="input-grid">
                        <div class="input-group"><label>Nộ tối đa:</label><input type="number" step="1" id="cfg-ul-max-rage"></div>
                        <div class="input-group"><label>Nộ mỗi kill:</label><input type="number" step="1" id="cfg-ul-gain-kill"></div>
                        <div class="input-group"><label>Thời gian ultimate (ms):</label><input type="number" step="100" id="cfg-ul-duration"></div>
                        <div class="input-group"><label>Thời gian hợp/tách (ms):</label><input type="number" step="50" id="cfg-ul-transition"></div>
                        <div class="input-group"><label>Số nấc hiển thị:</label><input type="number" step="1" id="cfg-ul-steps"></div>
                    </div>
                </div>
            </div>
            <div class="popup-footer">
                <button id="reset-settings" class="btn-reset">KHÔI PHỤC</button>
                <button id="save-settings" class="btn-save">XÁC NHẬN</button>
            </div>
        </div>
    </div>

    <script src="./assets/js/scripts.min.js"></script>
</body>

</html>
